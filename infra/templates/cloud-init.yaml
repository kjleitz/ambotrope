#cloud-config
package_update: true
package_upgrade: true

packages:
  - docker.io
  - caddy
  - snapd

write_files:
  - path: /etc/default/${project_name}
    permissions: "0640"
    owner: root:root
    content: |
      NODE_ENV=production
      PORT=${server_port}
      CORS_ORIGIN=${cors_origin}

  - path: /etc/default/${project_name}-ssm
    permissions: "0600"
    owner: root:root
    content: |
      AWS_REGION=${aws_region}
      SSM_ACTIVATION_CODE=${ssm_activation_code}
      SSM_ACTIVATION_ID=${ssm_activation_id}

  - path: /usr/local/bin/${project_name}-register-ssm
    permissions: "0700"
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      MARKER_DIR="/var/lib/${project_name}"
      MARKER_FILE="$${MARKER_DIR}/ssm-registered"
      SERVICE_NAME="snap.amazon-ssm-agent.amazon-ssm-agent.service"
      LOG_FILE="/var/log/${project_name}-ssm-bootstrap.log"

      exec > >(tee -a "$${LOG_FILE}") 2>&1

      retry() {
        local attempts="$1"
        local sleep_seconds="$2"
        shift 2

        local i
        for ((i = 1; i <= attempts; i++)); do
          if "$@"; then
            return 0
          fi
          echo "Attempt $${i}/$${attempts} failed: $*"
          sleep "$${sleep_seconds}"
        done

        return 1
      }

      if [[ -f "$${MARKER_FILE}" ]]; then
        exit 0
      fi

      . /etc/default/${project_name}-ssm

      mkdir -p "$${MARKER_DIR}"

      systemctl enable snapd.service snapd.socket
      systemctl start snapd.service snapd.socket
      retry 30 2 snap wait system seed.loaded

      if ! snap list amazon-ssm-agent >/dev/null 2>&1; then
        retry 10 5 snap install amazon-ssm-agent --classic
      fi

      systemctl stop "$${SERVICE_NAME}" || true

      retry 5 5 /snap/amazon-ssm-agent/current/amazon-ssm-agent \
        -register \
        -code "$${SSM_ACTIVATION_CODE}" \
        -id "$${SSM_ACTIVATION_ID}" \
        -region "$${AWS_REGION}"

      systemctl enable "$${SERVICE_NAME}"
      systemctl restart "$${SERVICE_NAME}"

      touch "$${MARKER_FILE}"
      rm -f /etc/default/${project_name}-ssm

  - path: /etc/systemd/system/${project_name}.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=${project_name} game server container
      After=network-online.target docker.service
      Wants=network-online.target
      Requires=docker.service

      [Service]
      Type=simple
      ExecStartPre=-/usr/bin/docker rm -f ${project_name}-server
      ExecStartPre=/usr/bin/docker pull ${server_image}
      ExecStart=/usr/bin/docker run --name ${project_name}-server --rm --pull never --env-file /etc/default/${project_name} -p 127.0.0.1:${server_port}:${server_port} ${server_image}
      ExecStop=/usr/bin/docker stop ${project_name}-server
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

  - path: /etc/caddy/Caddyfile
    permissions: "0644"
    owner: root:root
    content: |
%{ if domain_enabled ~}
      ${api_domain} {
          encode gzip
          reverse_proxy 127.0.0.1:${server_port}
      }
%{ else ~}
      :80 {
          encode gzip
          reverse_proxy 127.0.0.1:${server_port}
      }
%{ endif ~}

runcmd:
  - systemctl daemon-reload
  - systemctl enable --now docker
  - /usr/local/bin/${project_name}-register-ssm
  - systemctl enable caddy
  - systemctl restart caddy
  - systemctl enable --now ${project_name}.service
